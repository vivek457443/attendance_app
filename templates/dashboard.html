<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar">
    <div class="container-fluid d-flex justify-content-between">

        <span class="navbar-brand">
            Attendance Dashboard
        </span>

        <div>
            <button class="btn btn-light" onclick="toggleDarkMode()">
                🌙 / ☀️
            </button>

            <a href="/logout" class="btn btn-danger">
                Logout
            </a>
        </div>

    </div>
</nav>


<div class="container mt-4">

<!-- STUDENTS LIST -->

<table class="table table-bordered table-hover">

<thead class="table-primary">

<tr>
<th>Name</th>
<th>Student ID</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for student in students %}

<tr>

<td>{{ student.name }}</td>

<td>{{ student.student_id }}</td>

<td>

<a href="/student/{{ student.id }}" class="btn btn-primary btn-sm">
View Profile
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>


<!-- ACTIONS -->

<div class="card p-4">

<h5>Actions</h5>

<p class="text-muted mb-2">
Students will mark attendance themselves.
Date & Day are recorded automatically.
</p>

<a href="/attendance" class="btn btn-success">
🧑‍🎓 Open Student Attendance Page
</a>

</div>

</div>


<script src="{{ url_for('static', filename='js/script.js') }}"></script>

<script>

document.addEventListener('DOMContentLoaded', function () {

    if (localStorage.getItem("theme") === "dark") {

        document.body.classList.add("dark");

    }

});

</script>

</body>
</html>
