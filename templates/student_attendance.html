<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        /* Dark Mode Styles */
        body.dark {
            background-color: #121212;
            color: #f1f1f1;
        }
        body.dark .card {
            background-color: #1e1e1e;
            color: #f1f1f1;
        }
        body.dark .navbar {
            background-color: #1e1e1e !important;
            color: #f1f1f1;
        }
        body.dark .btn-outline-secondary {
            color: #f1f1f1;
            border-color: #f1f1f1;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-light bg-light px-3">
    <span class="navbar-brand">🧪 Lab Attendance</span>
    <button class="btn btn-outline-secondary btn-sm" onclick="toggleDarkMode()">🌙 / ☀️</button>
</nav>

<!-- Main Container -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4 shadow-sm">
                <!-- In-Time Section -->
                <h4 class="text-center mb-3">Mark In-Time</h4>
                <div class="alert alert-info text-center">
                    📅 Date, Day & Time are recorded automatically
                </div>

                {% if message %}
                    <div class="alert alert-success text-center">{{ message }}</div>
                {% endif %}

                {% if error %}
                    <div class="alert alert-warning text-center">{{ error }}</div>
                {% endif %}

                <form method="POST" class="mb-4">
                    <div class="mb-3">
                        <label for="student_id" class="form-label">Select Student:</label>
                        <select name="student_id" id="student_id" class="form-select" required>
                            {% for student in students %}
                                <option value="{{ student.id }}">
                                    {{ student.name }}{% if student.roll_no %} ({{ student.roll_no }}){% endif %}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="status" class="form-label">Attendance Status:</label>
                        <select name="status" id="status" class="form-select" required>
                            <option value="Present">Present</option>
                            <option value="Absent">Absent</option>
                            <option value="Leave">Leave</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-success w-100">✅ Mark In-Time</button>
                </form>

                <hr>

                <!-- Out-Time Section -->
                <h5 class="text-center mb-3">Mark Out-Time</h5>

{% for student in students %}
    <form action="/admin-mark-exit/{{ student.id }}" method="POST">
        <button type="submit" class="btn btn-danger btn-sm w-100 mt-2">
            ⏰ Mark Exit - {{ student.name }}
        </button>
    </form>
{% endfor %}

                <a href="/dashboard" class="btn btn-secondary w-100 mt-3">⬅ Back to Dashboard</a>
            </div>
        </div>
    </div>
</div>

<!-- Dark Mode Script -->
<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
}

document.addEventListener('DOMContentLoaded', function () {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
});
</script>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
